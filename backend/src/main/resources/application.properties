server.port=8080
spring.application.name=appointment-system
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/hospital_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgrespassword}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

app.jwt.secret=${JWT_SECRET:8f7e6d5c4b3a2109876543210987654321098765432109876543210987654321}
app.jwt.expiration-ms=3600000
app.jwt.refresh-expiration-ms=86400000

app.seed.enabled=true
app.seed.doctors=15
app.seed.patients=50
app.seed.appointments=300

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
