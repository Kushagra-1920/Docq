server:
  port: 8080

spring:
  application:
    name: appointment-system
  datasource:
    url: ${DB_URL:jdbc:h2:mem:hospital_db;DB_CLOSE_DELAY=-1}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true

app:
  jwt:
    secret: ${JWT_SECRET:8f7e6d5c4b3a2109876543210987654321098765432109876543210987654321}
    expiration-ms: 3600000 # 1 hour
    refresh-expiration-ms: 86400000 # 24 hours
  seed:
    enabled: true
    doctors: 15
    patients: 50
    appointments: 300

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
