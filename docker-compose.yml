version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: appointment_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: hospital_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: appointment_backend
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/hospital_db
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgrespassword
      - JWT_SECRET=8f7e6d5c4b3a2109876543210987654321098765432109876543210987654321
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v3/api-docs"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: appointment_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
